<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KB Mixer">
<meta name="theme-color" content="#0e0e0c">
<title>KB Mixer</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0e0e0c;color:#f0efe8;font-family:-apple-system,'SF Pro Text',sans-serif;overscroll-behavior:none}
.app{max-width:430px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}
.topbar{padding:18px 20px 0;border-bottom:.5px solid #2a2a26;background:#0e0e0c;position:sticky;top:0;z-index:10}
.topbar-label{font-size:11px;letter-spacing:.12em;color:#686860;font-weight:700;text-transform:uppercase;margin-bottom:12px}
.tabs{display:flex}
.tab{flex:1;padding:10px 0;font-size:14px;font-weight:500;color:#686860;background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;text-transform:capitalize}
.tab.active{color:#f0efe8;border-bottom-color:#f0efe8}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px 60px}
.shuffle-btn{width:100%;padding:14px;margin-bottom:16px;background:#f0efe8;color:#0e0e0c;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;letter-spacing:.01em}
.shuffle-btn:active{opacity:.7;transform:scale(.98)}
.shuffle-btn.spinning{background:#2a2a26;color:#686860}
.pair-card{background:#161614;border:.5px solid #2a2a26;border-radius:12px;margin-bottom:10px;overflow:hidden}
.pair-header{padding:8px 14px;background:#1a1a16;font-size:10px;font-weight:700;color:#686860;letter-spacing:.08em;text-transform:uppercase}
.ex-row{padding:13px 14px;display:flex;align-items:center;gap:10px;border-top:.5px solid #2a2a26}
.ex-row:first-of-type{border-top:none}
.badge{font-size:10px;font-weight:700;padding:4px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;letter-spacing:.03em}
.legs{background:#1a2a0a;color:#8fc94a}
.push{background:#0a1828;color:#5aaaf0}
.pull{background:#2a1505;color:#e09040}
.core{background:#18103a;color:#a090f0}
.hinge{background:#2a0d05;color:#e07050}
.full{background:#052018;color:#30d090}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:14px;font-weight:500;color:#f0efe8}
.ex-reps{font-size:12px;color:#686860;margin-top:2px}
.lock-btn{background:none;border:.5px solid #2a2a26;border-radius:8px;width:32px;height:32px;color:#686860;font-size:14px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.lock-btn.locked{background:#1a2a0a;border-color:#3a5a18;color:#8fc94a}
.lock-btn:active{opacity:.6}
.rules-card{background:#161614;border:.5px solid #2a2a26;border-radius:12px;padding:14px 16px;margin-bottom:12px;margin-top:4px}
.rules-title{font-size:10px;font-weight:700;color:#686860;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.rule{display:flex;gap:10px;font-size:13px;color:#a0a098;line-height:1.6;padding:2px 0}
.rule-n{color:#404040;flex-shrink:0}
.done-btn{width:100%;padding:14px;background:none;color:#a0a098;border:.5px solid #2a2a26;border-radius:12px;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s}
.done-btn.active{background:#1a2a0a;color:#8fc94a;border-color:#3a5a18;cursor:default}
.done-btn:active:not(.active){opacity:.7}
.cal-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:60px}
.cal-nav-row{display:flex;align-items:center;justify-content:space-between;padding:16px 20px}
.cal-nav{background:none;border:.5px solid #2a2a26;border-radius:8px;width:36px;height:36px;color:#f0efe8;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cal-nav:active{background:#2a2a26}
.cal-month{font-size:16px;font-weight:600}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:0 16px}
.cal-dow{text-align:center;font-size:10px;font-weight:700;color:#404040;padding:4px 0;letter-spacing:.05em}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:14px;border-radius:50%}
.cal-day.done-day{background:#1a2a0a;color:#8fc94a;font-weight:600}
.cal-day.today-day{font-weight:700;border:1.5px solid #686860}
.cal-day.done-day.today-day{background:#5a9010;color:#fff;border:none}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:24px 16px 0}
.stat{background:#161614;border:.5px solid #2a2a26;border-radius:12px;padding:16px}
.stat-label{font-size:10px;font-weight:700;color:#686860;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.stat-val{font-size:32px;font-weight:600;color:#f0efe8}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-label">Kettlebell Mixer</div>
    <div class="tabs">
      <button class="tab active" onclick="showTab('workout',this)">Workout</button>
      <button class="tab" onclick="showTab('calendar',this)">Calendar</button>
    </div>
  </div>

  <div id="pane-workout" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
    <div class="scroll" id="workout-scroll">
      <button class="shuffle-btn" id="shuffle-btn" onclick="doShuffle()">
        <span id="shuffle-icon" style="font-size:18px">&#8644;</span> Shuffle Workout
      </button>
      <div id="pairs-out"></div>
      <div class="rules-card">
        <div class="rules-title">How it works</div>
        <div class="rule"><span class="rule-n">1</span>Do A then B back to back, then rest. That's 1 set.</div>
        <div class="rule"><span class="rule-n">2</span>Aim for 2-4 sets per pair before moving on.</div>
        <div class="rule"><span class="rule-n">3</span>"Per side" = reps for each arm or leg.</div>
        <div class="rule"><span class="rule-n">4</span>"Alternating" = total reps, switching each rep.</div>
        <div class="rule"><span class="rule-n">5</span>Tap the lock icon to keep an exercise on next shuffle.</div>
      </div>
      <button class="done-btn" id="done-btn" onclick="markDone()">Mark today as complete</button>
    </div>
  </div>

  <div id="pane-calendar" style="display:none;flex-direction:column;flex:1;overflow:hidden">
    <div class="cal-scroll">
      <div class="cal-nav-row">
        <button class="cal-nav" onclick="prevMonth()">&#8249;</button>
        <span class="cal-month" id="cal-month-label"></span>
        <button class="cal-nav" onclick="nextMonth()">&#8250;</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="stats">
        <div class="stat"><div class="stat-label">This month</div><div class="stat-val" id="stat-month">0</div></div>
        <div class="stat"><div class="stat-label">All time</div><div class="stat-val" id="stat-total">0</div></div>
      </div>
    </div>
  </div>
</div>

<script>
var EX = [
  {n:"Lunges",r:"8-12",c:"per side",cat:"legs"},
  {n:"Squats (KB on neck)",r:"8-12",c:"total",cat:"legs"},
  {n:"Goblet squat",r:"8-12",c:"total",cat:"legs"},
  {n:"Around the world to squat",r:"8-12",c:"total",cat:"legs"},
  {n:"Double axe to load lunges",r:"8-12",c:"per side",cat:"legs"},
  {n:"KB pack toss and squat",r:"8-12",c:"total",cat:"legs"},
  {n:"KB Kossak squat",r:"8-12",c:"per side",cat:"legs"},
  {n:"Sumo squat",r:"8-12",c:"total",cat:"legs"},
  {n:"One hand press",r:"8-12",c:"per side",cat:"push"},
  {n:"See-saw KB press",r:"16-24",c:"alternating",cat:"push"},
  {n:"Static overhead curl",r:"8-12",c:"total",cat:"push"},
  {n:"Curl to press",r:"8-12",c:"total",cat:"push"},
  {n:"Overhead extension",r:"8-12",c:"total",cat:"push"},
  {n:"Concentration curl and press",r:"8-12",c:"per side",cat:"push"},
  {n:"Clean and press (1 bell)",r:"8-12",c:"per side",cat:"push"},
  {n:"Curl to clean",r:"8-12",c:"total",cat:"pull"},
  {n:"Goblet curls",r:"8-12",c:"total",cat:"push"},
  {n:"One arm row",r:"8-12",c:"per side",cat:"pull"},
  {n:"KB row (1-1-2)",r:"16-24",c:"alternating",cat:"pull"},
  {n:"Two hand KB upright row",r:"8-12",c:"total",cat:"pull"},
  {n:"KB bent-over row",r:"8-12",c:"total",cat:"pull"},
  {n:"Deadlift + KB row",r:"8-12",c:"total",cat:"pull"},
  {n:"Around the world tap switch",r:"16-24",c:"alternating",cat:"core"},
  {n:"Side to side hip toss",r:"16-24",c:"alternating",cat:"core"},
  {n:"KB halo",r:"8-12",c:"total",cat:"core"},
  {n:"KB sit ups",r:"8-12",c:"total",cat:"core"},
  {n:"Curl and halo",r:"8-12",c:"total",cat:"core"},
  {n:"Figure 8 to axe load",r:"16-24",c:"alternating",cat:"core"},
  {n:"KB axe drop",r:"8-12",c:"total",cat:"core"},
  {n:"Monkey spin pass",r:"16-24",c:"alternating",cat:"core"},
  {n:"Turkish sit ups",r:"8-12",c:"per side",cat:"core"},
  {n:"Turkish sit ups + 180",r:"16-24",c:"alternating",cat:"core"},
  {n:"Pendulums (1 bell)",r:"16-24",c:"alternating",cat:"core"},
  {n:"Half kneeling KB windmill",r:"8-12",c:"per side",cat:"core"},
  {n:"Half snatch",r:"8-12",c:"per side",cat:"hinge"},
  {n:"High-low swings",r:"8-12",c:"total",cat:"hinge"},
  {n:"Figure 8 to side swing",r:"16-24",c:"alternating",cat:"hinge"},
  {n:"Swing and snatch",r:"16-24",c:"alternating",cat:"hinge"},
  {n:"Classic snatch",r:"8-12",c:"per side",cat:"hinge"},
  {n:"Pull and snatch",r:"8-12",c:"per side",cat:"hinge"},
  {n:"Gorilla snatch",r:"16-24",c:"alternating",cat:"hinge"},
  {n:"Classic snatch and swing",r:"16-24",c:"alternating",cat:"hinge"},
  {n:"Dead pull and dead snatch",r:"8-12",c:"per side",cat:"hinge"},
  {n:"Switch hand snatch",r:"16-24",c:"alternating",cat:"hinge"},
  {n:"Kneeling power swing",r:"8-12",c:"total",cat:"hinge"},
  {n:"Lateral snatch",r:"8-12",c:"per side",cat:"hinge"},
  {n:"Pull and snatch (1 bell)",r:"8-12",c:"per side",cat:"hinge"},
  {n:"Outside step snatch",r:"8-12",c:"per side",cat:"hinge"},
  {n:"American swing",r:"8-12",c:"total",cat:"hinge"},
  {n:"B-stance KB single RDL",r:"8-12",c:"per side",cat:"hinge"},
  {n:"Double KB RDL",r:"8-12",c:"total",cat:"hinge"},
  {n:"Clean and press (2 bells)",r:"8-12",c:"total",cat:"full"},
  {n:"Side snatch to clean",r:"8-12",c:"per side",cat:"full"},
  {n:"Around the world to press",r:"16-24",c:"alternating",cat:"full"},
  {n:"Snatch-lunge (opposite hand)",r:"8-12",c:"per side",cat:"full"},
  {n:"Lateral clean snatch",r:"8-12",c:"per side",cat:"full"},
  {n:"Clean and snatch 2 KB",r:"8-12",c:"total",cat:"full"},
  {n:"Side snatch back lunge",r:"8-12",c:"per side",cat:"full"},
  {n:"Russian twists",r:"16-24",c:"alternating",cat:"core"},
  {n:"Switch-hand windmills",r:"8-10",c:"per side",cat:"full"},
  {n:"Around the world to snatch",r:"8-10",c:"per side",cat:"full"},
  {n:"One hand jerk",r:"8-10",c:"per side",cat:"push"},
  {n:"Two hand jerks",r:"8-10",c:"total",cat:"push"},
  {n:"Side clean",r:"16-24",c:"alternating",cat:"core"},
  {n:"Thrusters",r:"8-12",c:"total",cat:"full"}
];

var LABELS = {legs:"Legs",push:"Push",pull:"Pull",core:"Core",hinge:"Hinge",full:"Full Body"};
var PAIRS = [["legs","push"],["hinge","pull"],["legs","core"],["full","pull"],["hinge","push"]];
var MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
var DOWS = ["M","T","W","T","F","S","S"];

var currentPairs = [[null,null],[null,null],[null,null],[null,null],[null,null]];
var locked = [[false,false],[false,false],[false,false],[false,false],[false,false]];

var done = [];
try { done = JSON.parse(localStorage.getItem("kb_done") || "[]"); } catch(e) {}
function save() { try { localStorage.setItem("kb_done", JSON.stringify(done)); } catch(e) {} }

var today = new Date();
var calY = today.getFullYear(), calM = today.getMonth();

function todayStr() {
  return today.getFullYear() + "-" + pad(today.getMonth()+1) + "-" + pad(today.getDate());
}
function pad(n) { return String(n).padStart(2,"0"); }
function shuf(a) {
  a = a.slice();
  for (var i = a.length-1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i+1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}
function pick(cat) {
  var pool = EX.filter(function(e) { return e.cat === cat; });
  return shuf(pool)[0];
}

function renderPairs() {
  var html = "";
  for (var i = 0; i < PAIRS.length; i++) {
    if (!locked[i][0]) currentPairs[i][0] = pick(PAIRS[i][0]);
    if (!locked[i][1]) currentPairs[i][1] = pick(PAIRS[i][1]);
    html += '<div class="pair-card">';
    html += '<div class="pair-header">Pair ' + (i+1) + ' &middot; Superset</div>';
    html += exRow(currentPairs[i][0], i, 0);
    html += exRow(currentPairs[i][1], i, 1);
    html += '</div>';
  }
  document.getElementById("pairs-out").innerHTML = html;
}

function exRow(ex, pairIdx, slot) {
  var isLocked = locked[pairIdx][slot];
  return '<div class="ex-row">' +
    '<span class="badge ' + ex.cat + '">' + LABELS[ex.cat] + '</span>' +
    '<div class="ex-info">' +
      '<div class="ex-name">' + ex.n + '</div>' +
      '<div class="ex-reps">' + ex.r + ' &middot; ' + ex.c + '</div>' +
    '</div>' +
    '<button class="lock-btn' + (isLocked ? ' locked' : '') + '" onclick="toggleLock(' + pairIdx + ',' + slot + ')">&#128274;</button>' +
  '</div>';
}

function toggleLock(pairIdx, slot) {
  locked[pairIdx][slot] = !locked[pairIdx][slot];
  renderPairs();
}

function updateDoneBtn() {
  var btn = document.getElementById("done-btn");
  var t = done.indexOf(todayStr()) >= 0;
  btn.className = "done-btn" + (t ? " active" : "");
  btn.textContent = t ? "Done - Today marked complete" : "Mark today as complete";
}

function doShuffle() {
  var btn = document.getElementById("shuffle-btn");
  var icon = document.getElementById("shuffle-icon");
  btn.classList.add("spinning");
  icon.style.transform = "rotate(180deg)";
  icon.style.transition = "transform .2s";
  setTimeout(function() {
    renderPairs();
    btn.classList.remove("spinning");
    icon.style.transform = "rotate(0deg)";
  }, 200);
  document.getElementById("workout-scroll").scrollTo({top:0, behavior:"smooth"});
}

function markDone() {
  var d = todayStr();
  if (done.indexOf(d) < 0) { done.push(d); save(); }
  updateDoneBtn();
  renderCalendar();
}

function showTab(t, el) {
  document.querySelectorAll(".tab").forEach(function(b) { b.classList.remove("active"); });
  el.classList.add("active");
  document.getElementById("pane-workout").style.display = t === "workout" ? "flex" : "none";
  document.getElementById("pane-calendar").style.display = t === "calendar" ? "flex" : "none";
  if (t === "calendar") renderCalendar();
}

function renderCalendar() {
  document.getElementById("cal-month-label").textContent = MONTHS[calM] + " " + calY;
  var g = DOWS.map(function(d) { return '<div class="cal-dow">' + d + '</div>'; }).join("");
  var first = new Date(calY, calM, 1).getDay();
  if (first === 0) first = 7;
  for (var i = 1; i < first; i++) g += "<div></div>";
  var days = new Date(calY, calM+1, 0).getDate();
  var tStr = todayStr();
  for (var d = 1; d <= days; d++) {
    var ds = calY + "-" + pad(calM+1) + "-" + pad(d);
    var isDone = done.indexOf(ds) >= 0;
    var isTod = ds === tStr;
    var cls = "cal-day" + (isDone ? " done-day" : "") + (isTod ? " today-day" : "");
    g += '<div class="' + cls + '">' + d + '</div>';
  }
  document.getElementById("cal-grid").innerHTML = g;
  var mk = calY + "-" + pad(calM+1);
  document.getElementById("stat-month").textContent = done.filter(function(d) { return d.indexOf(mk) === 0; }).length;
  document.getElementById("stat-total").textContent = done.length;
}

function prevMonth() { calM--; if (calM < 0) { calM = 11; calY--; } renderCalendar(); }
function nextMonth() { calM++; if (calM > 11) { calM = 0; calY++; } renderCalendar(); }

renderPairs();
updateDoneBtn();
</script>
</body>
</html>
